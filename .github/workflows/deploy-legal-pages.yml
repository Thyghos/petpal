# Publishes app-store-legal-site/ (privacy, terms, support) to the gh-pages branch.
# After the first run: Repo Settings → Pages → Build from branch → gh-pages → /(root)

name: Deploy legal pages

on:
  push:
    branches:
      - main
    paths:
      - "app-store-legal-site/**"
      - "PRIVACY_POLICY.md"
      - "TERMS_OF_SERVICE.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-legal-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build privacy.html & terms.html from markdown
        run: cd app-store-legal-site && python3 build.py

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app-store-legal-site
          force_orphan: true
